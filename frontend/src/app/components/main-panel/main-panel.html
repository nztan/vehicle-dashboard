<div class="flex flex-col gap-4 bg-mist-900 border-2 border-mist-800">
  <div class="flex flex-row basis-2/3 gap-4">
    <app-gauge [name]="'kW'" [min]="-1000" [max]="1000" [value]="powerKw()"/>
    <app-gauge [name]="'rpm'" [min]="0" [max]="800" [value]="motorRpm()"/>
  </div>
  <div class="flex flex-row basis-1/3 items-center gap-4">
    <div class="flex flex-row justify-evenly basis-2/3 gap-4">
      <app-gear [value]="gear()"/>
      <app-battery [value]="batteryLevel()"/>
      <app-battery-temperature [value]="batteryTemperature()"/>
      <app-motor [value]="motorRpm()"/>
    </div>
    <div class="card flex justify-center items-center w-full p-4 flex-col basis-1/3">
      <span class="pb-4">Motor Speed Setting</span>
      <app-slider [formControl]="motorSpeedControl"/>
    </div>
  </div>
</div>
